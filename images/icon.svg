<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!--
      Arc: center (64,64), radius 36
      Start: (64, 28)   — 12 o'clock, angle 270°
      End:   (46, 33.97) — 11 o'clock, angle 240°
      300° clockwise: large-arc-flag=1, sweep-flag=1
      Arrowhead tangent at 240° → 240+90=330° (upper-right) ✓
    -->
    <marker id="head" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 Z" fill="#38bdf8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#0e0e1a"/>

  <!-- Outer glow ring (soft halo) -->
  <circle cx="64" cy="64" r="36"
          fill="none" stroke="#38bdf8" stroke-width="26" opacity="0.07"/>

  <!-- Arc medium glow -->
  <path d="M 64 28 A 36 36 0 1 1 46 33.97"
        stroke="#38bdf8" stroke-width="20" fill="none"
        stroke-linecap="round" opacity="0.18"/>

  <!-- Arc sharp glow -->
  <path d="M 64 28 A 36 36 0 1 1 46 33.97"
        stroke="#38bdf8" stroke-width="14" fill="none"
        stroke-linecap="round" opacity="0.35"/>

  <!-- Main arc — solid bright -->
  <path d="M 64 28 A 36 36 0 1 1 46 33.97"
        stroke="#38bdf8" stroke-width="9" fill="none"
        stroke-linecap="round"
        marker-end="url(#head)"/>

  <!-- Window 1: top-right (blue) -->
  <rect x="69" y="44" width="16" height="11" rx="2.5"
        fill="#38bdf8" opacity="0.18"/>
  <rect x="69" y="44" width="16" height="11" rx="2.5"
        fill="none" stroke="#38bdf8" stroke-width="2"/>
  <line x1="69" y1="48" x2="85" y2="48"
        stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>

  <!-- Window 2: bottom-left (violet) -->
  <rect x="43" y="73" width="16" height="11" rx="2.5"
        fill="#818cf8" opacity="0.18"/>
  <rect x="43" y="73" width="16" height="11" rx="2.5"
        fill="none" stroke="#818cf8" stroke-width="2"/>
  <line x1="43" y1="77" x2="59" y2="77"
        stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
</svg>
